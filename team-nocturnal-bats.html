<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nocturnal Bats Roster - Toruk Makto</title>
    <link rel="icon" type="image/jpeg" href="logo toruk.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .roster-showcase-container {
            max-width: 900px;
            margin: 4rem auto;
            padding: 0 1rem;
            text-align: center;
        }
        .roster-poster {
            width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            margin-bottom: 2rem;
        }
        .back-btn {
            display: inline-block;
            background-color: #1e293b;
            color: #fff;
            padding: 0.8rem 2rem;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background-color: var(--accent-color, #10b981);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="breadcrumb">
        <div class="container">
            <a href="index.html">Home</a> / <a href="teams.html">Franchises & Teams</a> / Nocturnal Bats
        </div>
    </div>

    <main class="roster-showcase-container">
        <!-- Verbatim graphic reference assigned to this specific team asset entry -->
        <img src="images/20.jpg" alt="Nocturnal Bats Official Team Sheet" class="roster-poster">
        <div>
            <a href="teams.html" class="back-btn">← Back to All Franchises</a>
        </div>
    </main>
     <!-- Floating Chat Button Trigger -->
<button class="chat-toggle-btn" id="chatToggle" aria-label="Open Chat">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
</button>

<!-- Hidden Chat Box Window -->
<div class="chat-window-container" id="chatWindow">
    <div class="chat-header-bar">
        <div class="chat-profile-status">
            <div class="status-green-dot"></div>
            <span class="chat-bot-title">League Assistant</span>
        </div>
        <button class="chat-close-x" id="chatClose">&times;</button>
    </div>
    
    <div class="chat-messages-body" id="chatBody">
        <div class="chat-bubble bot-bubble">
            <p>Hi! Welcome to the Toruk Makto Golf League. How can I help you today?</p>
        </div>
    </div>
    
    <div class="chat-input-area">
        <form id="chatForm">
            <input type="text" id="chatInput" placeholder="Ask a question..." autocomplete="off" required>
            <button type="submit" class="chat-send-submit">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </form>
    </div>
</div>

    <!-- Back to Top Button -->
    <button class="back-to-top" title="Back to top">↑</button>
    <script src="script.js"></script>
</body>
</html>
